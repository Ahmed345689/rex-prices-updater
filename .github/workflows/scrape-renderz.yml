name: Scrape players

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Maximum number of pages to scrape (0 = all)"
        required: false
        default: "0"
  schedule:
    # Runs every day at 04:00 UTC. Adjust or remove as needed.
    - cron: "0 4 * * *"

jobs:
  scrape:
    name: Scrape players
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          # Installs Chromium browser + the OS libraries it needs
          # (libnss, libatk, etc.) on the Ubuntu runner.
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          OUTPUT_FILE: assets/players.json
          MAX_PAGES: ${{ github.event.inputs.max_pages || '0' }}
          HEADLESS: "1"
          NAV_TIMEOUT_MS: "90000"
          RESPONSE_TIMEOUT_S: "120"
          DEBUG: "1"
        run: |
          mkdir -p assets
          python scripts/python/scrape_renderz.py

      - name: Show summary
        if: always()
        run: |
          if [ ! -f assets/players.json ]; then
            echo "No assets/players.json was produced."
            exit 1
          fi
          echo "players.json size: $(wc -c < assets/players.json) bytes"
          python scripts/python/summarize_players.py assets/players.json

      - name: Upload players.json artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: players-json
          path: assets/players.json
          retention-days: 14

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-on-failure
          path: |
            debug_screenshot.png
            debug_page.html
            debug_info.json
            players.json
          if-no-files-found: ignore
          retention-days: 14

      # OPTIONAL: commit the result back to the repo on the default branch.
      # Comment this step out if you only want artifacts.
      - name: Commit updated players.json
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # remove old root-level players.json from prior runs (if any)
          if [ -f players.json ] && [ ! -L players.json ]; then
            git rm -f players.json || true
          fi
          git add assets/players.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): refresh assets/players.json [skip ci]"
            git push
          fi
