name: Update Players JSON
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-players:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright beautifulsoup4
      - run: playwright install --with-deps chromium
      - run: python scripts/python/scrape_renderz.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players.json
          git diff --staged --quiet || git commit -m "Update players - $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
