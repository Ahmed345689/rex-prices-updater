name: Scrape RenderZ Players

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Maximum number of pages to scrape (0 = all)"
        required: false
        default: "0"
  schedule:
    # Runs every day at 04:00 UTC. Adjust or remove as needed.
    - cron: "0 4 * * *"

jobs:
  scrape:
    name: Scrape players
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          # Installs Chromium browser + the OS libraries it needs
          # (libnss, libatk, etc.) on the Ubuntu runner.
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          OUTPUT_FILE: players.json
          MAX_PAGES: ${{ github.event.inputs.max_pages || '0' }}
          HEADLESS: "1"
          NAV_TIMEOUT_MS: "90000"
          RESPONSE_TIMEOUT_S: "90"
          DEBUG: "1"
        run: |
          python scripts/python/scrape_renderz.py

      - name: Show summary
        if: always()
        run: |
          if [ -f players.json ]; then
            echo "players.json size: $(wc -c < players.json) bytes"
            python -c "import json; d=json.load(open('players.json')); print(f\"totalPlayers={d['totalPlayers']} pagesScraped={d['pagesScraped']}\"); print('first 3:'); [print(' ', p['name'], '->', p['price']) for p in d['players'][:3]]"
          else
            echo "No players.json was produced."
            exit 1
          fi

      - name: Upload players.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: players-json
          path: players.json
          retention-days: 14

      # OPTIONAL: commit the result back to the repo on the default branch.
      # Comment this step out if you only want artifacts.
      - name: Commit updated players.json
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add players.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): refresh players.json [skip ci]"
            git push
          fi
