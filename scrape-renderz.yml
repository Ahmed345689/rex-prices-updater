name: Scrape players

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      season:
        description: "FIFA season number (e.g. 25)"
        required: false
        default: "25"
      max_pages:
        description: "Maximum pages to scrape (0 = all)"
        required: false
        default: "0"
      min_players:
        description: "Fail if fewer than this many players are captured"
        required: false
        default: "50"
  schedule:
    # Every Monday at 04:00 UTC — weekly is enough since player data
    # doesn't change that frequently. Change to "0 4 * * *" for daily.
    - cron: "0 4 * * 1"

jobs:
  scrape:
    name: Scrape players (season ${{ github.event.inputs.season || '25' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright + dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          SEASON: ${{ github.event.inputs.season || '25' }}
          OUTPUT_FILE: assets/data/players.json
          MAX_PAGES: ${{ github.event.inputs.max_pages || '0' }}
          HEADLESS: "1"
          NAV_TIMEOUT_MS: "90000"
          RESPONSE_TIMEOUT_S: "120"
          DEBUG: "1"
        run: |
          mkdir -p assets/data
          python scripts/python/scrape_renderz.py

      - name: Validate & summarize output
        env:
          MIN_PLAYERS: ${{ github.event.inputs.min_players || '50' }}
        run: |
          if [ ! -f assets/data/players.json ]; then
            echo "ERROR: assets/data/players.json was not produced."
            exit 1
          fi
          echo "players.json size: $(wc -c < assets/data/players.json) bytes"
          python scripts/python/summarize_players.py assets/data/players.json
          TOTAL=$(python -c "import json; d=json.load(open('assets/data/players.json')); print(d.get('totalPlayers',0))")
          echo "Total players captured: ${TOTAL}"
          if [ "${TOTAL}" -lt "${MIN_PLAYERS}" ]; then
            echo "ERROR: Only ${TOTAL} players captured, minimum required is ${MIN_PLAYERS}."
            echo "Check debug artifacts below to see what went wrong."
            exit 1
          fi
          echo "OK: ${TOTAL} players captured."

      - name: Upload players.json artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: players-json-season-${{ github.event.inputs.season || '25' }}
          path: assets/data/players.json
          retention-days: 30

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-on-failure
          path: |
            debug_screenshot.png
            debug_page.html
            debug_info.json
            players.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit updated players.json
        if: success() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f players.json ] && [ ! -L players.json ]; then
            git rm -f players.json || true
          fi
          git add assets/data/players.json
          if git diff --cached --quiet; then
            echo "No changes to commit — data is already up to date."
          else
            SEASON="${{ github.event.inputs.season || '25' }}"
            TOTAL=$(python -c "import json; d=json.load(open('assets/data/players.json')); print(d.get('totalPlayers',0))")
            git commit -m "chore(data): season ${SEASON} — ${TOTAL} players [skip ci]"
            git push
          fi
